name: Security Scan

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  schedule:
    # Run nightly at 02:00 UTC
    - cron: "0 2 * * *"

jobs:
  trivy-fs:
    name: Trivy — Filesystem Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy (filesystem)
        uses: aquasecurity/trivy-action@0.24.0
        with:
          scan-type: fs
          scan-ref: .
          trivy-config: security/trivy/trivy.yaml
          format: sarif
          output: trivy-results.sarif

      - name: Upload SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif

  trivy-image:
    name: Trivy — Image Scan (${{ matrix.service }})
    runs-on: ubuntu-latest
    needs: trivy-fs
    strategy:
      fail-fast: false
      matrix:
        service: [matchmaking-api, worker]

    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: |
          docker build \
            -t game-backend-platform/${{ matrix.service }}:${{ github.sha }} \
            services/${{ matrix.service }}

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@0.24.0
        with:
          scan-type: image
          image-ref: game-backend-platform/${{ matrix.service }}:${{ github.sha }}
          trivy-config: security/trivy/trivy.yaml
          format: sarif
          output: trivy-image-${{ matrix.service }}.sarif

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-image-${{ matrix.service }}.sarif

  sbom:
    name: Generate SBOM (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [matchmaking-api, worker]

    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: |
          docker build \
            -t game-backend-platform/${{ matrix.service }}:${{ github.sha }} \
            services/${{ matrix.service }}

      - name: Generate SBOM with Syft
        uses: anchore/sbom-action@v0
        with:
          image: game-backend-platform/${{ matrix.service }}:${{ github.sha }}
          config: security/syft/syft.yaml
          artifact-name: sbom-${{ matrix.service }}.spdx.json
          output-file: sbom-${{ matrix.service }}.spdx.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ matrix.service }}
          path: sbom-${{ matrix.service }}.spdx.json
