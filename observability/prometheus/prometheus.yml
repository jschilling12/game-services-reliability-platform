global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers: []

rule_files: []

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: matchmaking-api
    static_configs:
      - targets: ["api_blue:8000"]
    metrics_path: /metrics

  - job_name: worker
    static_configs:
      - targets: ["worker:9091"]
    metrics_path: /metrics

  - job_name: gateway
    static_configs:
      - targets: ["nginx-exporter:9113"]
    metrics_path: /metrics
