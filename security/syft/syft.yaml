# Syft SBOM generator configuration
# https://github.com/anchore/syft

# Output format: spdx-json | cyclonedx-json | syft-json | table
output: spdx-json

# File to write the SBOM to (relative to project root when run from CI)
file: sbom.spdx.json

# Scope: squashed (default) | all-layers
scope: squashed

# Catalogers to enable (auto-detected when empty)
catalogers: []
